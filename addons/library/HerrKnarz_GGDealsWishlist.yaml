ShortDescription: 'plugin to import your GG.deals wishlist as games into Playnite'
Description: |
    Import your GG.deals wishlist into your Playnite library to have your wishlisted games always at your fingertips!
    Clicking on Install/Play will send you to the GG.deals page of the game.
    You can set up a special category to give your wishlisted games after import to separate them from your owned games.
    
    In the future there also will be options to be notified of discounts, removal of wishlist games once they are imported from another library etc.
