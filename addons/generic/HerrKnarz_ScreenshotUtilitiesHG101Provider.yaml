ShortDescription: 'provider addon for Screenshot Utilities to display screenshots of game reviews from the website Hardcore Gaming 101'
Description: |-
    This is a provider addon for Screenshot Utilities. It only works in tandem with Screenshot Utilities and enables the display of game review screenshots from the website Hardcore Gaming 101. The addon uses an existing link to the website and also tries to find a review based on the game name if no link was found. You can also search for the right review manually.
