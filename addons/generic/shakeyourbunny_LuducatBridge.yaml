AddonId: LuducatBridge
Type: Generic
Name: luducat Bridge
Author: shakeyourbunny
ShortDescription: Remote game launching bridge for luducat - launch Playnite games from Linux or Windows over LAN
InstallerManifestUrl: https://raw.githubusercontent.com/luducat/luducat-bridge/main/InstallerManifest.yaml
SourceUrl: https://github.com/luducat/luducat-bridge
Description: |-
  Enables remote launching of Playnite-managed games from luducat (Linux or Windows)
  over the local network. After pairing via encrypted channel, games are started by
  matching library name and game ID. Communication is secured via TLS with ECDSA key 
  exchange and HMAC-TOTP sessions and any handshake certificates are stored securely via the
  CredentialsManager. Access between both sides of the bridge are restricted to LAN and local
  VMs.
IconUrl: https://raw.githubusercontent.com/luducat/luducat-bridge/main/icon.png
Tags: ['Generic', 'Luducat', 'Bridge', 'Linux', 'Windows', 'Remote', 'LAN']
Links:
