Description: |
  Personal Cloud Library Source treats a user-supplied manifest as a normal Playnite library source.

  Latest update: v0.2.0, released June 15, 2026. This release adds a guided setup flow, in-Playnite manifest generation, verification reports, safer plugin-generated file writes, and improved dark-theme readability in the settings screen.

  It is designed for personal libraries stored on cloud storage, a NAS, an external drive, a mapped drive, a synced cloud folder, or another machine with more storage than the device where you normally play. Entries can appear in Playnite before they are downloaded or copied locally, so you can organize them, filter installed and uninstalled items, and use Playnite's normal metadata tools before caching the actual files.

  The v0.2.0 guided setup can generate a v3 manifest from local folders, external drives, mapped drives, and NAS paths directly inside Playnite settings. Advanced users can still use the included manifest-generation scripts for scripted local or rclone workflows.

  Provider modes include LocalFile, LocalFolder, and RcloneRemote. Google Drive, OneDrive, Dropbox, and similar cloud services are supported through rclone. Local folders, external drives, mapped drives, synced cloud folders, and NAS paths are supported directly.

  When you are ready to play an entry, the plugin can copy or download user-owned files to a local cache, then Playnite launches the cached file like a normal local game. Cached files can later be removed from the local cache while keeping the catalog entry and Playnite metadata.

  Verification reports help troubleshoot manifest loading, cache paths, missing metadata, download eligibility, and safe uninstall targets without dumping a full private library inventory by default.

  This is not a gameplay streaming service. It does not provide games, ROMs, BIOS files, cracks, keys, copyrighted content, scraping, storefront access, or download sources. It catalogs user-supplied entries and copies or downloads files only from user-configured local folders or rclone remotes.

