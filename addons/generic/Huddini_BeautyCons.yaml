Description: |
  BeautyCons enhances your Playnite game library with customizable visual effects on game icons in the Desktop detail view.

  Key Features:
  - 8 glow styles with 13+ color presets or auto-extracted icon colors
  - Metallic shimmer with style-specific luster tinting (Gold, Platinum, Crimson, Holographic, Icon Colors)
  - Transform effects: levitation, 3D rotation, hover, breathing scale
  - Shadow drift and parallax for depth
  - Square and Circular effect shapes
  - 13 theme presets for quick setup
  - Sparkles, pulse, color cycle, and spin animations

  Desktop mode only. Effects are applied via visual tree injection — see About tab for known limitations.
