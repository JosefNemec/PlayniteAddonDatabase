Author: HerrKnarz
InstallerManifestUrl: https://raw.githubusercontent.com/HerrKnarz/Playnite-Extensions/master/Manifest/HerrKnarz_ScreenshotUtilitiesLocalProvider.yaml
SourceUrl: https://github.com/HerrKnarz/Playnite-Extensions
IconUrl: https://raw.githubusercontent.com/HerrKnarz/Playnite-Extensions/master/Generic/ScreenshotUtilitiesLocalProvider/icon.png
ShortDescription: 'provider addon for Screenshot Utilities to display locally stored screenshots'
Description: |-
    This is a provider addon for Screenshot Utilities. It only works in tandem with Screenshot Utilities and enables the display of locally stored screenshots from your games. You can set up paths with placeholders like game name, steam id etc. to your screenshots on your PC in the addon settings. In a later version it also will be possible to set up paths per game.
