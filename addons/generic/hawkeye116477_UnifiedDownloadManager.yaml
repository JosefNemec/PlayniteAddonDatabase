AddonId: "UnifiedDownloadManager"
Type: Generic
InstallerManifestUrl: https://raw.githubusercontent.com/hawkeye116477/playnite-unifiedDownloadManager-plugin/main/installer.yaml
ShortDescription: "One common interface for all downloads from compatible plugins"
Description: |-
  It allows to:
  * manage queue
  * automatically remove completed downloads
  * display desktop notifications about finished tasks
  * turn off your PC after download is complete

  However it won't work if your library plugin doesn't support it (currently handled only by Legendary, GOG OSS and Nile plugins).
