AddonId: GamepadToKeyboard
Type: Generic
Name: GamepadToKeyboard
Author: roob-p
ShortDescription: |
 🕹️ Emulate mouse and keyboard input with your gamepad in a quick, easy and highly customizable manner.
 Perfect for old games without native controller support or with incomplete Xinput functionality.
InstallerManifestUrl: https://raw.githubusercontent.com/roob-p/GamepadToKeyboard-PlayniteExtension/main/manifest.yaml
SourceUrl: https://github.com/roob-p/GamepadToKeyboard-PlayniteExtension
Description: |
    🕹️ Emulate mouse and keyboard input with your gamepad in a quick, easy and highly customizable manner.
    Perfect for old games without native controller support or with incomplete Xinput functionality.

    Features:
    * Easy and fast configuration through editable `.ini` files.
    * Dedicated per-game configs or global shared configs.
    * Automatic startup when launching configured games.
    * Config selection directly from the Playnite menu.    
    * Favourite config profiles accessible through dynamic sub-menus.
    * Multiple game selection support, with batch config creation.
    * Live config reload via hotkey, without restarting the application.
    * Mouse and keyboard emulation with fully customizable button assignments.
    * Mouse movement can be mapped to an analog stick with a dedicated variable. 
    * Supports modifiers such as Toggle, Turbo, Combo, Execute, ComboAsync, Sequence and others.
    * Fine control over deadzones, deadzone shapes (rectangular and circular), axis inversion and analog behavior.
    * Supports both digital and analog mouse wheel input.
    * Clear and intuitive menu with LED-style status indicators, and one-click functionality toggles.
    * ⚠️ Requires an Xinput gamepad (native or emulated via tools like DS4Windows, DualSenseX or x360ce).
