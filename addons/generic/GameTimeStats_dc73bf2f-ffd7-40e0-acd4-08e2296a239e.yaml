Description: |
    Game Time Statistics adds a standalone statistics window to Playnite. It tracks local game sessions, recovers interrupted sessions, visualizes daily and hourly play patterns, and can optionally enrich data with Steam playtime information.

    Game Time Statistics 为 Playnite 添加独立统计窗口。插件会记录本地游戏会话、恢复异常中断的会话、可视化每日和每小时游玩习惯，并可选择使用 Steam 时长数据进行补充。
