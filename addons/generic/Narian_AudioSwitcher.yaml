Type: Generic
Name: Audio Switcher
Author: Narian
ShortDescription: Switch Windows audio output and input devices directly from Playnite Desktop and Fullscreen mode.
InstallerManifestUrl: https://raw.githubusercontent.com/Naerian/playnite-nx-audio-switcher/main/installer.yaml
SourceUrl: https://github.com/Naerian/playnite-nx-audio-switcher
Description: Audio Switcher lets you change Windows playback and recording devices from Playnite, including Fullscreen mode, game context menus, controller quick switch, per-game output/input audio profiles, custom device names and icons, optional device hiding, volume controls, notification preferences, and Fullscreen theme integration support. Experimental Spatial Sound switching is available through a user-provided SoundVolumeView or svcl executable.
